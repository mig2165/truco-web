  <g fill="#202124" font-family="Georgia, 'Times New Roman', serif">
    <text x="302" y="254" font-size="31">has no price-setting power unlike traditional monopolies), but can still harm competition,</text>
    <text x="302" y="355" font-size="31">innovation, and advertisers.</text>

    <text x="390" y="451" font-size="31">In this essay, monopoly power is defined as persistent market dominance and ability</text>
    <text x="302" y="541" font-size="31">to exclude rivals. Google can be classified as a monopoly according to this definition as it has</text>
    <text x="302" y="632" font-size="31">held its market control since its inception two decades ago (Ibid.) and has engaged in</text>
    <text x="302" y="723" font-size="31">non-competitive practices like self-preferencing with browsers like Chrome (Motta, 2023).</text>
    <text x="302" y="814" font-size="31">An abuse of monopoly power is when the monopoly uses its market power to reduce</text>
    <text x="302" y="904" font-size="31">consumer welfare in an attempt to increase profits. (Lamoreaux, 2019, p.98-99).</text>

    <text x="390" y="985" font-size="31">This essay will respond to the question “To what extent does Google abuse its</text>
    <text x="302" y="1062" font-size="31">monopoly power in the search engine industry in the US?”. By exploring economic</text>
    <text x="302" y="1139" font-size="31">mechanisms of a monopoly market structure and assessing empirical studies on Google’s</text>
  </g>

  <g fill="#202124" font-family="Georgia, 'Times New Roman', serif" font-size="31" font-weight="700">
    <text x="302" y="1216">practices, it will be shown that Google abuses its monopoly power in a partial but</text>
  </g>

  <g fill="#202124" font-family="Georgia, 'Times New Roman', serif">
    <text x="302" y="1255" font-size="31" font-weight="700">non-trivial way, leading to limited but noticeable welfare loss for consumers.</text>
    <text x="302" y="1290" font-size="31" font-style="italic" fill="#5F6368">Essay outline</text>
  </g>
